<!-- This is the section within your departments.html where you add an employee -->
<!-- Usually found within a Modal or a side panel -->

<form action="{{ url_for('routes.add_department_employee') }}" method="POST">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Employee Number</label>
            <input type="text" name="employee_number" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label text-primary fw-bold">Secret Access Code</label>
            <input type="text" name="employee_code" class="form-control border-primary" placeholder="e.g. SECURE123" required>
            <small class="text-muted">The employee must use this code to log in.</small>
        </div>
        <div class="col-md-6">
            <label class="form-label">Initial Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Department</label>
            <select name="department" class="form-select">
                {% for dept in department_list %}
                <option value="{{ dept }}">{{ dept }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label">Position</label>
            <input type="text" name="position" class="form-control" required>
        </div>
        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-success w-100">
                <i class="bi bi-person-plus"></i> Register Employee Account
            </button>
        </div>
    </div>
</form>
