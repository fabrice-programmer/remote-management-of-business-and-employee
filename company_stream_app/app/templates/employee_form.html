{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header">
            <h3>{{ action }} Employee: {{ employee.full_name or employee.username }}</h3>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control" value="{{ employee.full_name }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ employee.email }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-danger fw-bold">Login Access Code</label>
                        <input type="text" name="employee_code" class="form-control border-danger" value="{{ employee.employee_code }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Department</label>
                        <select name="department" class="form-select">
                            {% for dept in department_list %}
                            <option value="{{ dept }}" {% if dept == employee.department %}selected{% endif %}>{{ dept }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <!-- Add other fields (phone, position, hire_date, role) as needed here -->
                    <div class="col-12 pt-3">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{{ url_for('routes.employee_detail', employee_id=employee.id) }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
