{% extends 'base.html' %}

{% block title %}
Manager Dashboard
{% endblock %}

{% block content %}

<div class="container mt-4">

    <!-- Header -->
    <div class="text-center mb-4">
        <h2>🧑‍💼 Manager Dashboard</h2>
        <p class="text-muted">Control employees, departments, and reports</p>
    </div>

    <!-- Stats -->
    <div class="row">

        <div class="col-md-4 mb-3">
            <div class="card bg-primary text-white shadow">
                <div class="card-body text-center">
                    <h5>Employees</h5>
                    <h2>32</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card bg-success text-white shadow">
                <div class="card-body text-center">
                    <h5>Reports</h5>
                    <h2>14</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card bg-warning text-white shadow">
                <div class="card-body text-center">
                    <h5>Pending Approvals</h5>
                    <h2>6</h2>
                </div>
            </div>
        </div>

    </div>

    <!-- Actions -->
    <div class="card mt-4 shadow-sm">
        <div class="card-body">

            <h5>Quick Actions</h5>

            <a href="{{ url_for('departments') }}" class="btn btn-primary m-1">
                View Departments
            </a>

            <a href="{{ url_for('dashboard') }}" class="btn btn-success m-1">
                Main Dashboard
            </a>

            <a href="#" class="btn btn-dark m-1">
                Approve Reports
            </a>

        </div>
    </div>

</div>

{% endblock %}
